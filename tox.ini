[tox]
envlist =
    py{36, 311, 312}-dj{32}
    py{311, 312}-dj{40}
    flake8
    bandit
    coverage

[testenv]
usedevelop = True
deps =
    dj32: Django>=3.2,<4.0
    dj40: Django>=4.0,<4.1

    py36: coverage==6.2
    py36: tblib==1.3
    py36: virtualenv==20.15.1
    py36: python_utils==2.4.0
    py36: pluggy==1.0.0
    py36: progressbar2==3.53.1
    py36: asgiref==3.4.1
    py36: pyparsing==2.4.7
    py36: packaging==20.4
    py36: toml==0.9.4
    py36: wheel==0.36.2
    py36: py==1.4.17
    py312: setuptools>=68

    ; Install the requirements for the test environment
    .[test]

changedir = patchman_django_sharding
passenv = DATABASE_URL DATABASE_URL2 TEAMCITY_VERSION
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.teamcity
    py36: VIRTUALENV_PIP = 21.3.1
    py36: VIRTUALENV_WHEEL = 0.36.2
commands =
    coverage run manage.py test --noinput --parallel {posargs}

[testenv:flake8]
deps =
    flake8==3.5.0
    flake8-teamcity==0.0.4
changedir = {toxinidir}
ignore_errors = true
commands =
    ; Beginning the line with a `-` will ignore the exit code. This is what we want, because we don't want the linters
    ; to fail the tests.
    - flake8 --format=teamcity patchman_django_sharding

[testenv:bandit]
deps =
    bandit==1.6.0
    bandit-teamcity==0.2.0
changedir = {toxinidir}
ignore_errors = true
commands =
    ; Beginning the line with a `-` will ignore the exit code. This is what we want, because we don't want the linters
    ; to fail the tests.
    - bandit -r patchman_django_sharding/ --ini {toxinidir}/.bandit -f teamcity

[testenv:coverage]
deps =
    coverage==4.5.1
setenv =
    VIRTUALENV_PIP = 21.3.1
commands =
    coverage html
    python {toxinidir}/coverage.py
