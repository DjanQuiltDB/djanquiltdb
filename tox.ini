[tox]
envlist =
    py314-dj60
    ruff
    coverage

[testenv]
usedevelop = True
deps =
    Django>=6.0,<7.0
    psycopg[binary]>=3.0.0
    setuptools>=68

    ; Install the requirements for the test environment
    .[test]

changedir = djanquiltdb
passenv =
    DATABASE_URL
    DATABASE_URL2
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.dev
    VIRTUALENV_PIP = 23.3.1
allowlist_externals =
    coverage
commands =
    coverage run manage.py test --noinput {posargs} --parallel

[testenv:ruff]
deps =
    ruff>=0.1.0
skip_install = true
changedir = {toxinidir}
allowlist_externals =
    ruff
commands =
    - ruff check djanquiltdb
    - ruff format --check djanquiltdb

[testenv:coverage]
deps =
    coverage
skip_install = true
changedir = djanquiltdb
allowlist_externals =
    coverage
    python
commands =
    - coverage html
    python {toxinidir}/coverage.py
