[tox]
envlist =
    py{34,36}-dj{18,19,110}
    flake8
    bandit
    coverage

[testenv]
usedevelop = True
deps =
    dj18: Django>=1.8,<1.9
    dj19: Django>=1.9,<1.10
    dj110: Django>=1.10,<1.11

    teamcity-messages==1.21
    coverage==4.5.1

    ; Install the requirements for the test environment
    .[test]
changedir = django_sharding
passenv = DATABASE_URL DATABASE_URL2
setenv =
    DJANGO_SETTINGS_MODULE = config.settings.teamcity
commands =
    coverage run manage.py test --noinput {posargs}

[testenv:flake8]
deps =
    flake8==3.5.0
    flake8-teamcity==0.0.4
ignore_errors = true
commands =
    ; Beginning the line with a `-` will ignore the exit code. This is what we want, because we don't want the linters
    ; to fail the tests.
    - flake8 --format=teamcity django_sharding

[testenv:bandit]
deps =
    bandit==1.4.1.dev7
ignore_errors = true
commands =
    ; Beginning the line with a `-` will ignore the exit code. This is what we want, because we don't want the linters
    ; to fail the tests.
    - bandit -r django_sharding/ -f teamcity

[testenv:coverage]
deps =
    coverage==4.5.1
changedir = django_sharding
commands =
    coverage html
    python {toxinidir}/coverage.py
